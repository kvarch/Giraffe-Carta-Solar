<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sun Path 3D · KV [vG21]</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body{font-family:'Hind',system-ui,sans-serif;overflow:hidden}
    .ks::-webkit-scrollbar{width:3px}.ks::-webkit-scrollbar-thumb{background:#2d3748;border-radius:2px}
    .sl{-webkit-appearance:none;appearance:none;width:100%;height:3px;background:#1e2533;border-radius:2px;outline:none;cursor:pointer}
    .sl::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#F59E0B;border:2px solid #0f1117;cursor:pointer}
    .tg{position:relative;width:34px;height:18px;background:#2d3748;border-radius:9px;cursor:pointer;border:none;padding:0;transition:background .2s;flex-shrink:0}
    .tg.on{background:rgba(245,158,11,.15);border:1px solid #F59E0B80}
    .tg::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:#718096;transition:all .2s}
    .tg.on::after{transform:translateX(16px);background:#F59E0B}
  </style>
</head>
<body class="bg-[#0f1117] text-slate-200">
<div id="root"></div>
<script type="module">
import{createElement as h,useState,useEffect,useRef,useMemo}from'https://esm.sh/react@18';
import{createRoot}from'https://esm.sh/react-dom@18/client';
import{giraffeState,rpc}from'https://esm.sh/@gi-nx/iframe-sdk@latest';
import*as turf from'https://esm.sh/@turf/turf@6.5.0';

// ══════════════════════════════════════════════════════════════════════════
//  CONSTANTES
// ══════════════════════════════════════════════════════════════════════════
const D2R=Math.PI/180,R2D=180/Math.PI;
const MCOLORS=['#fff7ad','#ffe491','#ffd175','#ffbe59','#ffaa3d','#ff9621','#ff8205','#f26e00','#e55a00','#d84600','#cc3200','#bf1e00'];
const ANA_COL='#4d8fbf', SUN_COL=['#D97706','#F59E0B'];
const L={PATHS:'sp-paths',COMPASS:'sp-compass',LABELS:'sp-labels',DOT:'sp-dot',POLE:'sp-pole',DAYARC:'sp-dayarc'};
const _n=new Date(),_doy=Math.floor((_n-new Date(_n.getFullYear(),0,0))/864e5);
const INIT={lat:-23.5558,lng:-46.6396,hr:Math.round((_n.getHours()+_n.getMinutes()/60)*4)/4,doy:Math.max(1,Math.min(365,_doy)),radius:100};
const seasons=lat=>({sum:lat<0?355:172,win:lat<0?172:355,eqMar:79,eqSep:266,
  sumLbl:lat<0?'Dez':'Jun',winLbl:lat<0?'Jun':'Dez'});

// ══════════════════════════════════════════════════════════════════════════
//  MOTOR SOLAR — NOAA / Jean Meeus
// ══════════════════════════════════════════════════════════════════════════
function julianDay(d,hh,y=2000){const l=(y%4===0&&y%100!==0)||y%400===0;const m=[0,31,l?29:28,31,30,31,30,31,31,30,31,30,31];let mo=1,r=d;while(r>m[mo]&&mo<12){r-=m[mo];mo++;}let Y=y,M=mo;if(M<=2){Y--;M+=12;}const A=Math.floor(Y/100),B=2-A+Math.floor(A/4);return Math.floor(365.25*(Y+4716))+Math.floor(30.6001*(M+1))+r+B-1524.5+hh/24;}
function calcSun(lat,lng,doy,hr){
  const JD=julianDay(doy,hr),T=(JD-2451545)/36525;
  let L0=280.46646+T*(36000.76983+T*0.0003032);L0=((L0%360)+360)%360;
  let M=357.52911+T*(35999.05029-0.0001537*T);M=((M%360)+360)%360;
  const Mr=M*D2R,e=0.016708634-T*(0.000042037+0.0000001267*T);
  const C=(1.914602-T*(0.004817+0.000014*T))*Math.sin(Mr)+(0.019993-0.000101*T)*Math.sin(2*Mr)+0.000289*Math.sin(3*Mr);
  const sl=L0+C,om=125.04-1934.136*T,la=sl-0.00569-0.00478*Math.sin(om*D2R);
  const e0=23+(26+(21.448-T*(46.815+T*(0.00059-T*0.001813)))/60)/60,ep=e0+0.00256*Math.cos(om*D2R),er=ep*D2R;
  const dec=Math.asin(Math.max(-1,Math.min(1,Math.sin(er)*Math.sin(la*D2R))))*R2D;
  const y2=Math.pow(Math.tan(er/2),2),L0r=L0*D2R;
  const eot=4*R2D*(y2*Math.sin(2*L0r)-2*e*Math.sin(Mr)+4*e*y2*Math.sin(Mr)*Math.cos(2*L0r)-0.5*y2*y2*Math.sin(4*L0r)-1.25*e*e*Math.sin(2*Mr));
  const tz=Math.round(lng/15);let tst=(hr*60+eot+4*lng-60*tz);tst=((tst%1440)+1440)%1440;
  const ha=(tst/4)-180,har=ha*D2R,latr=lat*D2R,decr=dec*D2R;
  const cosZ=Math.sin(latr)*Math.sin(decr)+Math.cos(latr)*Math.cos(decr)*Math.cos(har);
  const zen=Math.acos(Math.max(-1,Math.min(1,cosZ)))*R2D,alt=90-zen;
  const sinZ=Math.sin(zen*D2R);let az;
  if(Math.abs(sinZ)<1e-10){az=lat>=0?180:0;}
  else{const ca=(Math.sin(latr)*cosZ-Math.sin(decr))/(Math.cos(latr)*sinZ);const ar=Math.acos(Math.max(-1,Math.min(1,ca)));az=ha>0?(ar*R2D+180)%360:(540-ar*R2D)%360;}
  return{alt,az,day:alt>-0.83};
}

// ══════════════════════════════════════════════════════════════════════════
//  HELPERS GEOGRÁFICOS
// ══════════════════════════════════════════════════════════════════════════
const local2geo=(x,y,oLng,oLat)=>[oLng+x/(111320*Math.cos(oLat*D2R)),oLat+y/111320];
const fc=feats=>({type:'FeatureCollection',features:feats});
const rm=async id=>{try{await rpc.invoke('removeTempLayer',[id]);}catch{}};

// ══════════════════════════════════════════════════════════════════════════
//  TÉCNICA CORE — MICROSSEGUIMENTOS COM baseHeight
//  Cada LineString horizontal é elevado pela propriedade _baseHeight.
//  Passos curtíssimos fazem os segmentos se fundirem em curva contínua.
// ══════════════════════════════════════════════════════════════════════════
function segLine(coords3D,props){
  const segs=[];
  for(let i=0;i<coords3D.length-1;i++){
    const[lng1,lat1,z1]=coords3D[i],[lng2,lat2,z2]=coords3D[i+1];
    if(z1<-0.5&&z2<-0.5)continue;
    const midZ=Math.max(0,(z1+z2)/2);
    segs.push({type:'Feature',geometry:{type:'LineString',coordinates:[[lng1,lat1],[lng2,lat2]]},
      // baseHeight + _baseHeight → elevam a linha nos layers temporários (Giraffe custom)
      // height = midZ + 0.1 → sinaliza ao Giraffe que é geometria 3D (necessário nos layers permanentes)
      properties:{...props,baseHeight:midZ,_baseHeight:midZ,height:midZ+0.1}});
  }
  return segs;
}

// Gera coordenadas 3D de um arco solar [lng, lat, Z_metros]
function arcCoords3D(lat,lng,doy,radius,step=0.04){
  const pts=[];
  for(let hh=0;hh<=24;hh+=step){
    const s=calcSun(lat,lng,doy,hh);if(!s.day&&s.alt<-0.5)continue;
    const a=s.alt*D2R,z=s.az*D2R;
    const[ln,la]=local2geo(radius*Math.cos(a)*Math.sin(z),radius*Math.cos(a)*Math.cos(z),lng,lat);
    pts.push([ln,la,Math.max(0,radius*Math.sin(a))]);
  }
  return pts;
}

// ══════════════════════════════════════════════════════════════════════════
//  SYNC SOL NO GIRAFFE — deleta layerTree para não piscar layers
// ══════════════════════════════════════════════════════════════════════════
async function syncGiraffeSun(az,alt){
  if(alt<-5)return{ok:false,why:'night'};
  const views=giraffeState.get('views')||[];if(!views.length)return{ok:false,why:'no_views'};
  try{
    const v=JSON.parse(JSON.stringify(views[0]));
    // CRÍTICO: deletar layerTree evita que edifícios e layers piscam
    delete v.layerTree;delete v.layers;
    await rpc.invoke('activateViewLayers',[{...v,sun:{...(v.sun||{}),azimuth:az,altitude:alt},sunAzimuth:az,sunAltitude:alt}]);
    return{ok:true};
  }catch{return{ok:false,why:'error'};}
}

// ══════════════════════════════════════════════════════════════════════════
//  COMPASSO LADYBUG (2 anéis + ticks)
// ══════════════════════════════════════════════════════════════════════════
async function plotCompass(lat,lng,radius){
  await rm(L.COMPASS);await rm(L.LABELS);
  const ctr=[lng,lat],R=radius,R1=radius*0.95,feats=[],lbls=[];
  // Anel externo
  const or=[];for(let a=0;a<=360;a+=2)or.push(turf.destination(turf.point(ctr),R/1000,a,{units:'kilometers'}).geometry.coordinates);
  feats.push(turf.lineString(or,{color:'#4a5568',width:1.5,opacity:0.7}));
  // Anel interno
  const ir=[];for(let a=0;a<=360;a+=2)ir.push(turf.destination(turf.point(ctr),R1/1000,a,{units:'kilometers'}).geometry.coordinates);
  feats.push(turf.lineString(ir,{color:'#4a5568',width:1.0,opacity:0.4}));
  // Ticks
  for(let a=0;a<360;a+=10){const iL=a%30===0,rT=iL?R*0.90:R*0.95;
    const p1=turf.destination(turf.point(ctr),rT/1000,a,{units:'kilometers'}).geometry.coordinates;
    const p2=turf.destination(turf.point(ctr),R/1000,a,{units:'kilometers'}).geometry.coordinates;
    feats.push(turf.lineString([p1,p2],{color:'#4a5568',width:iL?1.2:0.7,opacity:iL?0.6:0.3}));}
  // Labels N/S/L/O + 30°
  for(let a=0;a<360;a+=30){let lbl=a+'°';if(a===0)lbl='N';else if(a===90)lbl='L';else if(a===180)lbl='S';else if(a===270)lbl='O';
    lbls.push(turf.destination(turf.point(ctr),(R+15)/1000,a,{units:'kilometers',properties:{label:lbl}}));}
  await rpc.invoke('addTempLayerGeoJSON',[L.COMPASS,fc(feats),{type:'line',paint:{'line-color':['get','color'],'line-width':['get','width'],'line-opacity':['get','opacity']}}]);
  await rpc.invoke('addTempLayerGeoJSON',[L.LABELS,fc(lbls),{type:'symbol',layout:{'text-field':['get','label'],'text-size':12,'text-pitch-alignment':'map','text-rotation-alignment':'map'},paint:{'text-color':'#94a3b8','text-halo-color':'#000','text-halo-width':1.5}}]);
}

// ══════════════════════════════════════════════════════════════════════════
//  MALHA ANALÍTICA — 12 arcos mensais + analemas (microsseguimentos)
// ══════════════════════════════════════════════════════════════════════════
function generateMesh(lat,lng,radius,currentDoy){
  const ss=lat<0?[355,17,46,79,107,137,172,199,229,266,292,321]:[172,199,229,266,292,321,355,17,46,79,107,137];
  const feats=[];
  // 12 arcos mensais (h += 0.04 → 600 pontos/arco → curva suave)
  for(let m=0;m<12;m++){
    const isCur=Math.abs(currentDoy-ss[m])<15;
    const pts=arcCoords3D(lat,lng,ss[m],radius,0.04);
    feats.push(...segLine(pts,{color:MCOLORS[m],stroke:MCOLORS[m],width:isCur?2.5:1.5,_opacity:isCur?0.9:0.65}));
  }
  // Analemas (doy += 1 → máxima resolução)
  for(let hh=8;hh<=18;hh++){
    const pts=[];
    for(let d=1;d<=365;d++){
      const s=calcSun(lat,lng,d,hh);if(!s.day||s.alt<=0)continue;
      const a=s.alt*D2R,z=s.az*D2R;
      const[ln,la]=local2geo(radius*Math.cos(a)*Math.sin(z),radius*Math.cos(a)*Math.cos(z),lng,lat);
      pts.push([ln,la,Math.max(0,radius*Math.sin(a))]);
    }
    feats.push(...segLine(pts,{color:ANA_COL,stroke:ANA_COL,width:1.0,_opacity:0.5}));
  }
  return feats;
}

async function plotWireframes(lat,lng,radius,doy){
  await rm(L.PATHS);
  const feats=generateMesh(lat,lng,radius,doy);
  if(!feats.length)return;
  await rpc.invoke('addTempLayerGeoJSON',[L.PATHS,fc(feats),{type:'line',paint:{'line-color':['get','color'],'line-width':['get','width'],'line-opacity':['get','_opacity']}}]);
}

// ══════════════════════════════════════════════════════════════════════════
//  ARCO DO DIA (h += 0.02 → ultra suave, amarelo)
// ══════════════════════════════════════════════════════════════════════════
async function plotDayArc(lat,lng,doy,radius){
  await rm(L.DAYARC);
  const pts=arcCoords3D(lat,lng,doy,radius,0.02);
  if(pts.length<2)return;
  const feats=segLine(pts,{color:'#F59E0B',stroke:'#F59E0B',width:3,_opacity:0.95});
  if(!feats.length)return;
  await rpc.invoke('addTempLayerGeoJSON',[L.DAYARC,fc(feats),{type:'line',paint:{'line-color':['get','color'],'line-width':['get','width'],'line-opacity':['get','_opacity']}}]);
}

// ══════════════════════════════════════════════════════════════════════════
//  SOL (circle viewport) + MASTRO (ticks com baseHeight)
// ══════════════════════════════════════════════════════════════════════════
async function plotSun(lat,lng,doy,hr,radius){
  await rm(L.DOT);await rm(L.POLE);
  const s=calcSun(lat,lng,doy,hr);if(!s.day)return;
  const a=s.alt*D2R,z=s.az*D2R;
  const coordZ=Math.max(0,radius*Math.sin(a));
  const[sLng,sLat]=local2geo(radius*Math.cos(a)*Math.sin(z),radius*Math.cos(a)*Math.cos(z),lng,lat);
  const col=s.alt>20?SUN_COL[1]:SUN_COL[0];

  // Mastro: ticks horizontais cruzados com _baseHeight crescente (sem sombra!)
  const step=Math.max(0.5,coordZ/60),tk=Math.max(0.4,radius*0.004);
  const poleFeats=[];
  for(let z2=0;z2<=coordZ;z2+=step){
    const[pN,pS]=[local2geo(0,tk,sLng,sLat),local2geo(0,-tk,sLng,sLat)];
    const[pE,pW]=[local2geo(tk,0,sLng,sLat),local2geo(-tk,0,sLng,sLat)];
    poleFeats.push(
      {type:'Feature',geometry:{type:'LineString',coordinates:[pN,pS]},properties:{baseHeight:z2,_baseHeight:z2,color:col,width:1,_opacity:0.35}},
      {type:'Feature',geometry:{type:'LineString',coordinates:[pE,pW]},properties:{baseHeight:z2,_baseHeight:z2,color:col,width:1,_opacity:0.35}}
    );
  }
  if(poleFeats.length){
    await rpc.invoke('addTempLayerGeoJSON',[L.POLE,fc(poleFeats),{type:'line',paint:{'line-color':['get','color'],'line-width':['get','width'],'line-opacity':['get','_opacity']}}]);
  }

  // Sol: circle com circle-pitch-alignment viewport + Z na coordenada
  await rpc.invoke('addTempLayerGeoJSON',[L.DOT,{type:'FeatureCollection',features:[
    {type:'Feature',geometry:{type:'Point',coordinates:[sLng,sLat,coordZ]},properties:{color:col}}
  ]},{type:'circle',paint:{
    'circle-radius':10,'circle-color':['get','color'],'circle-opacity':1,
    'circle-stroke-width':2,'circle-stroke-color':'#fff','circle-stroke-opacity':0.9,
    'circle-pitch-alignment':'viewport'
  }}]);
}

// ══════════════════════════════════════════════════════════════════════════
//  GERADOR GLB — RIBBON MESH + KHR_materials_unlit (sem sombras)
// ══════════════════════════════════════════════════════════════════════════
const h2r=hex=>[parseInt(hex.slice(1,3),16)/255,parseInt(hex.slice(3,5),16)/255,parseInt(hex.slice(5,7),16)/255];

function buildRibbon(pts,halfW=0.12,vertical=true){
  if(pts.length<2)return null;
  const pos=[],idx=[];let mn=[1e9,1e9,1e9],mx=[-1e9,-1e9,-1e9];
  for(let i=0;i<pts.length;i++){
    const p=pts[i];let ox=0,oy=0,oz=0;
    if(vertical){oz=halfW;}
    else{let dx=0,dy=0;if(i<pts.length-1){dx=pts[i+1][0]-p[0];dy=pts[i+1][1]-p[1];}else{dx=p[0]-pts[i-1][0];dy=p[1]-pts[i-1][1];}const ln=Math.sqrt(dx*dx+dy*dy)||1;ox=-dy/ln*halfW;oy=dx/ln*halfW;}
    // glTF Y-up: gX=localX(E), gY=localZ(Up), gZ=-localY(N)
    const ax=p[0]+ox,ay=p[2]+oz,az=-(p[1]+oy);
    const bx=p[0]-ox,by=Math.max(0,p[2]-oz),bz=-(p[1]-oy);
    pos.push(ax,ay,az,bx,by,bz);
    for(const[x,y,z]of[[ax,ay,az],[bx,by,bz]]){mn[0]=Math.min(mn[0],x);mx[0]=Math.max(mx[0],x);mn[1]=Math.min(mn[1],y);mx[1]=Math.max(mx[1],y);mn[2]=Math.min(mn[2],z);mx[2]=Math.max(mx[2],z);}
    if(i>0){const b=(i-1)*2,c=i*2;idx.push(b,b+1,c+1,b,c+1,c);}
  }
  return{positions:new Float32Array(pos),indices:new Uint16Array(idx),min:mn,max:mx};
}
function mergeRibbons(rs){rs=rs.filter(Boolean);if(!rs.length)return null;let tP=0,tI=0;for(const r of rs){tP+=r.positions.length;tI+=r.indices.length;}const P=new Float32Array(tP),I=new Uint16Array(tI);let pO=0,iO=0,vO=0,mn=[1e9,1e9,1e9],mx=[-1e9,-1e9,-1e9];for(const r of rs){P.set(r.positions,pO);for(let i=0;i<r.indices.length;i++)I[iO+i]=r.indices[i]+vO;pO+=r.positions.length;iO+=r.indices.length;vO+=r.positions.length/3;for(let j=0;j<3;j++){mn[j]=Math.min(mn[j],r.min[j]);mx[j]=Math.max(mx[j],r.max[j]);}}return{positions:P,indices:I,min:mn,max:mx};}

function glbGeometry(lat,lng,radius){
  const groups=[],hw=Math.max(0.12,radius*0.002);
  const ss=lat<0?[355,17,46,79,107,137,172,199,229,266,292,321]:[172,199,229,266,292,321,355,17,46,79,107,137];
  // 12 arcos
  for(let m=0;m<12;m++){
    const pts=[];
    for(let hh=0;hh<=24;hh+=0.15){const s=calcSun(lat,lng,ss[m],hh);if(!s.day&&s.alt<-1)continue;const a=s.alt*D2R,z=s.az*D2R;pts.push([radius*Math.cos(a)*Math.sin(z),radius*Math.cos(a)*Math.cos(z),Math.max(0,radius*Math.sin(a))]);}
    if(pts.length>1){const rb=buildRibbon(pts,hw,true);if(rb){rb.color=h2r(MCOLORS[m]);groups.push(rb);}}
  }
  // Analemas
  const aRibs=[];
  for(let hh=8;hh<=18;hh++){const pts=[];for(let d=1;d<=365;d+=2){const s=calcSun(lat,lng,d,hh);if(!s.day||s.alt<=0)continue;const a=s.alt*D2R,z=s.az*D2R;pts.push([radius*Math.cos(a)*Math.sin(z),radius*Math.cos(a)*Math.cos(z),Math.max(0,radius*Math.sin(a))]);}if(pts.length>2){pts.push(pts[0]);const rb=buildRibbon(pts,hw*0.7,true);if(rb)aRibs.push(rb);}}
  if(aRibs.length){const m=mergeRibbons(aRibs);if(m){m.color=h2r(ANA_COL);groups.push(m);}}
  // Gaiola
  const dRibs=[];for(const alt of[10,20,30,40,50,60,70,80]){const rr=radius*Math.cos(alt*D2R),zz=radius*Math.sin(alt*D2R);if(rr<1)continue;const pts=[];for(let i=0;i<=90;i++){const t=(i/90)*2*Math.PI;pts.push([rr*Math.sin(t),rr*Math.cos(t),zz]);}const rb=buildRibbon(pts,hw*0.6,true);if(rb)dRibs.push(rb);}
  if(dRibs.length){const m=mergeRibbons(dRibs);if(m){m.color=[0.35,0.35,0.35];groups.push(m);}}
  // Compasso Ladybug
  const cRibs=[];
  for(const r of[radius,radius*0.95]){const pts=[];for(let i=0;i<=90;i++){const t=(i/90)*2*Math.PI;pts.push([r*Math.sin(t),r*Math.cos(t),0]);}const rb=buildRibbon(pts,hw,false);if(rb)cRibs.push(rb);}
  for(let az=0;az<360;az+=10){const iL=az%30===0,rT=iL?radius*0.90:radius*0.95,ar=az*D2R;const rb=buildRibbon([[rT*Math.sin(ar),rT*Math.cos(ar),0],[radius*Math.sin(ar),radius*Math.cos(ar),0]],iL?hw*0.8:hw*0.4,false);if(rb)cRibs.push(rb);}
  if(cRibs.length){const m=mergeRibbons(cRibs);if(m){m.color=[0.29,0.34,0.41];groups.push(m);}}
  return groups;
}

function buildGLB(groups){
  let tb=0;const off=[];
  for(const g of groups){const pO=tb;tb+=g.positions.byteLength;tb=(tb+3)&~3;const iO=tb;tb+=g.indices.byteLength;tb=(tb+3)&~3;off.push({pO,pL:g.positions.byteLength,iO,iL:g.indices.byteLength});}
  const binBuf=new ArrayBuffer(tb),binU8=new Uint8Array(binBuf);
  for(let i=0;i<groups.length;i++){binU8.set(new Uint8Array(groups[i].positions.buffer,groups[i].positions.byteOffset,groups[i].positions.byteLength),off[i].pO);binU8.set(new Uint8Array(groups[i].indices.buffer,groups[i].indices.byteOffset,groups[i].indices.byteLength),off[i].iO);}
  const bv=[],acc=[],meshes=[],mats=[],nodes=[];let bvI=0,acI=0;
  for(let i=0;i<groups.length;i++){

    mats.push({pbrMetallicRoughness:{baseColorFactor:[...g.color,0.95]},doubleSided:true,alphaMode:'BLEND',extensions:{KHR_materials_unlit:{}}});
    bv.push({buffer:0,byteOffset:o.pO,byteLength:o.pL,target:34962});bv.push({buffer:0,byteOffset:o.iO,byteLength:o.iL,target:34963});
    acc.push({bufferView:bvI,componentType:5126,count:g.positions.length/3,type:'VEC3',min:g.min.map(v=>+v.toFixed(3)),max:g.max.map(v=>+v.toFixed(3))});
    acc.push({bufferView:bvI+1,componentType:5123,count:g.indices.length,type:'SCALAR'});
    meshes.push({primitives:[{attributes:{POSITION:acI},indices:acI+1,material:i}]});nodes.push({mesh:i});bvI+=2;acI+=2;
  }

  let jsonStr=JSON.stringify(gltf);while(jsonStr.length%4!==0)jsonStr+=' ';

function downloadGLB(lat,lng,radius){

// ══════════════════════════════════════════════════════════════════════════
//  CARTA SOLAR SVG (inline, carta de referência visual)
// ══════════════════════════════════════════════════════════════════════════
const SR=80,SCX=100,SCY=100;
const s2svg=(alt,az)=>{const r=SR*Math.cos(alt*D2R);return[SCX+r*Math.sin(az*D2R),SCY-r*Math.cos(az*D2R)];};
function buildPath(lat,lng,doy){const pp=[];for(let hh=0;hh<=24;hh+=0.25){const s=calcSun(lat,lng,doy,hh);if(!s.day||s.alt<0)continue;const[x,y]=s2svg(s.alt,s.az);pp.push(pp.length?`L${x.toFixed(1)},${y.toFixed(1)}`:`M${x.toFixed(1)},${y.toFixed(1)}`);}return pp.join('');}

function SolarChart({lat,lng,doy,sun,seas}){
  const paths=useMemo(()=>({sum:buildPath(lat,lng,seas.sum),win:buildPath(lat,lng,seas.win),eq:buildPath(lat,lng,seas.eqMar),tod:buildPath(lat,lng,doy)}),[lat,lng,doy,seas]);
  const dot=sun?.day?s2svg(sun.alt,sun.az):null;
  return h('div',{className:'bg-[#080c12] border border-slate-800 rounded-lg overflow-hidden shrink-0'},
    h('svg',{viewBox:'0 0 200 200',className:'w-full',style:{height:'130px'}},
      h('rect',{width:200,height:200,fill:'#080c12'}),
      ...[{r:SR,s:'#1e3a5f',w:1.2},{r:SR*Math.cos(30*D2R),s:'#162032',w:.6},{r:SR*Math.cos(60*D2R),s:'#162032',w:.6}].map(({r,s,w},i)=>h('circle',{key:i,cx:SCX,cy:SCY,r:r.toFixed(1),stroke:s,strokeWidth:w,fill:'none'})),
      h('text',{x:SCX+2,y:SCY-SR*Math.cos(30*D2R)+7,fill:'#1e3a5f',fontSize:6},'30°'),
      h('text',{x:SCX+2,y:SCY-SR*Math.cos(60*D2R)+7,fill:'#1e3a5f',fontSize:6},'60°'),
      ...[...Array(12)].map((_,i)=>{const ar=i*30*D2R,c=i%3===0;return h('line',{key:i,x1:SCX,y1:SCY,x2:(SCX+SR*Math.sin(ar)).toFixed(1),y2:(SCY-SR*Math.cos(ar)).toFixed(1),stroke:c?'#1e3a5f':'#0f172a',strokeWidth:c?.6:.3});}),
      ...[{t:'N',x:SCX,y:9},{t:'S',x:SCX,y:196},{t:'L',x:194,y:SCY+4},{t:'O',x:6,y:SCY+4}].map(({t,x,y})=>h('text',{key:t,x,y,textAnchor:'middle',fill:'#334155',fontSize:7,fontWeight:'600'},t)),
      paths.sum&&h('path',{d:paths.sum,stroke:'#F59E0B',strokeWidth:1.8,fill:'none',opacity:.8}),
      paths.win&&h('path',{d:paths.win,stroke:'#38BDF8',strokeWidth:1.8,fill:'none',opacity:.75}),
      paths.eq&&h('path',{d:paths.eq,stroke:'#34D399',strokeWidth:1.8,fill:'none',opacity:.75}),
      paths.tod&&h('path',{d:paths.tod,stroke:'#fff',strokeWidth:2,fill:'none',opacity:.9}),
      dot&&h('g',null,
        h('line',{x1:SCX,y1:SCY,x2:dot[0].toFixed(1),y2:dot[1].toFixed(1),stroke:'#F59E0B',strokeWidth:.5,opacity:.3,strokeDasharray:'2,2'}),
        h('circle',{cx:dot[0].toFixed(1),cy:dot[1].toFixed(1),r:8,fill:'#F59E0B',opacity:.1}),
        h('circle',{cx:dot[0].toFixed(1),cy:dot[1].toFixed(1),r:4,fill:'#F59E0B',stroke:'#fff',strokeWidth:1.2})
      ),h('circle',{cx:SCX,cy:SCY,r:2,fill:'#1e293b'})
    ),
    h('div',{className:'flex items-center gap-3 px-2 py-1 border-t border-slate-800'},
      ...[{c:'#F59E0B',l:'Verão'},{c:'#38BDF8',l:'Inverno'},{c:'#34D399',l:'Equi.'},{c:'#fff',l:'Hoje'}].map(({c,l})=>h('span',{key:l,className:'flex items-center gap-1'},h('div',{style:{width:12,height:2,background:c,borderRadius:1}}),h('span',{className:'text-[8px] text-slate-500'},l)))
    )
  );
}

// ══════════════════════════════════════════════════════════════════════════
//  APP PRINCIPAL
// ══════════════════════════════════════════════════════════════════════════
const fmtH=h=>`${String(Math.floor(h)).padStart(2,'0')}:${String(Math.round((h%1)*60)).padStart(2,'0')}`;
const fmtD=d=>new Date(2024,0,d).toLocaleDateString('pt-BR',{day:'numeric',month:'short'});

function SolarApp(){
  const[lat,setLat]=useState(INIT.lat);const[lng,setLng]=useState(INIT.lng);
  const[hr,setHr]=useState(INIT.hr);const[doy,setDoy]=useState(INIT.doy);
  const[rad,setRad]=useState(INIT.radius);const[scale,setScale]=useState(1.0);
  const[show,setShow]=useState(false);const[sync,setSync]=useState('idle');
  const[busy,setBusy]=useState(false);const[glbBusy,setGlbBusy]=useState(false);
  const seas=useMemo(()=>seasons(lat),[lat]);
  const sunNow=useMemo(()=>calcSun(lat,lng,doy,hr),[lat,lng,doy,hr]);
  const effRad=Math.round(rad*scale);
  const syncT=useRef(null),dotT=useRef(null),genT=useRef(null),gen=useRef(0);

  // Centro do mapa ao montar
  useEffect(()=>{(async()=>{try{const b=await rpc.invoke('getMapBounds',[]);const ring=b?.features?.[0]?.geometry?.coordinates?.[0];if(!ring)return;const lo=ring.map(c=>c[0]),la=ring.map(c=>c[1]);setLng(parseFloat(((Math.min(...lo)+Math.max(...lo))/2).toFixed(6)));setLat(parseFloat(((Math.min(...la)+Math.max(...la))/2).toFixed(6)));}catch{}})();},[]);

  // Sync sol (debounced 150ms) — deleta layerTree
  useEffect(()=>{if(syncT.current)clearTimeout(syncT.current);syncT.current=setTimeout(async()=>{setSync('syncing');const r=await syncGiraffeSun(sunNow.az,sunNow.alt);setSync(r.ok?'ok':r.why);},150);return()=>clearTimeout(syncT.current);},[sunNow]);

  // Sol no mapa
  useEffect(()=>{if(!show)return;if(dotT.current)clearTimeout(dotT.current);dotT.current=setTimeout(()=>plotSun(lat,lng,doy,hr,effRad),80);return()=>clearTimeout(dotT.current);},[lat,lng,doy,hr,effRad,show]);

  // Carta (compasso + wireframes + arco do dia)
  useEffect(()=>{
    if(!show){Object.values(L).forEach(rm);return;}
    const id=++gen.current;
    if(genT.current)clearTimeout(genT.current);
    genT.current=setTimeout(async()=>{
      if(id!==gen.current)return;
      await plotCompass(lat,lng,effRad);
      await plotWireframes(lat,lng,effRad,doy);
      await plotDayArc(lat,lng,doy,effRad);
    },300);return()=>{clearTimeout(genT.current);gen.current=id+1;};
  },[lat,lng,effRad,doy,show]);

  useEffect(()=>()=>Object.values(L).forEach(rm),[]);

  // ─── CENTRALIZAR NA SELEÇÃO ──────────────────────────────────────────
  const handleCenter=async()=>{
    const applyCoords=(cLng,cLat,src)=>{
      setLat(parseFloat(cLat.toFixed(6)));setLng(parseFloat(cLng.toFixed(6)));
      console.log(`[vG21] ✓ Centro via ${src}: ${cLat.toFixed(5)},${cLng.toFixed(5)}`);
    };
    const centroidOf=feats=>{
      const valid=feats.filter(f=>{const g=f?.geometry||f;return g&&g.type&&g.coordinates;}).map(f=>f.type==='Feature'?f:{type:'Feature',geometry:f.geometry||f,properties:{}});
      if(!valid.length)return null;
      try{return turf.centroid({type:'FeatureCollection',features:valid});}catch{return null;}
    };
    try{
      // 1. giraffeState.get('selectedFeatures') — features prontas
      const sf=giraffeState.get('selectedFeatures');
      if(sf?.length){const c=centroidOf(sf);if(c){applyCoords(...c.geometry.coordinates,'selectedFeatures');return;}}

      // 2. rpc.invoke('getSelectedFeatures') — RPC direto
      try{const sf2=await rpc.invoke('getSelectedFeatures',[]);if(sf2?.length){const c=centroidOf(sf2);if(c){applyCoords(...c.geometry.coordinates,'getSelectedFeatures');return;}}}catch{}

      // 3. giraffeState.get('selected') → IDs → rpc.invoke('getFeatures',[ids])
      const ids=giraffeState.get('selected');
      if(ids?.length){
        try{
          const cleanIds=Array.from(ids).filter(Boolean).map(String).slice(0,50);
          const feats=await rpc.invoke('getFeatures',[cleanIds]);
          if(feats?.length){const c=centroidOf(feats);if(c){applyCoords(...c.geometry.coordinates,'getFeatures');return;}}
        }catch{}
      }

      // 4. getQueriedFeature — último elemento clicado/hover (inclui buildings)
      try{
        const qf=await rpc.invoke('getQueriedFeature',[]);
        if(qf){const c=centroidOf([qf]);if(c){applyCoords(...c.geometry.coordinates,'getQueriedFeature');return;}}
      }catch{}

      // 5. Fallback: centro do mapa visível
      const b=await rpc.invoke('getMapBounds',[]);const ring=b?.features?.[0]?.geometry?.coordinates?.[0];
      if(ring){const lo=ring.map(c=>c[0]),la=ring.map(c=>c[1]);applyCoords((Math.min(...lo)+Math.max(...lo))/2,(Math.min(...la)+Math.max(...la))/2,'mapBounds');}
    }catch(e){console.warn('[vG21] center:',e?.message);}
  };

  // ─── BAKE ────────────────────────────────────────────────────────────
  const handleBake=async(mode)=>{
    if(busy)return;setBusy(true);
    try{
      const pathFeats=generateMesh(lat,lng,effRad,doy);
      const ctr=[lng,lat],R=effRad,R1=effRad*0.95,compassF=[],lblF=[];
      // Compasso Ladybug
      const or=[];for(let a=0;a<=360;a+=2)or.push(turf.destination(turf.point(ctr),R/1000,a,{units:'kilometers'}).geometry.coordinates);compassF.push(turf.lineString(or,{color:'#4a5568',stroke:'#4a5568',width:1.5,_opacity:0.7,baseHeight:0,_baseHeight:0,height:0.1}));
      const ir=[];for(let a=0;a<=360;a+=2)ir.push(turf.destination(turf.point(ctr),R1/1000,a,{units:'kilometers'}).geometry.coordinates);compassF.push(turf.lineString(ir,{color:'#4a5568',stroke:'#4a5568',width:1.0,_opacity:0.4,baseHeight:0,_baseHeight:0,height:0.1}));
      for(let a=0;a<360;a+=10){const iL=a%30===0,rT=iL?R*0.90:R*0.95;const p1=turf.destination(turf.point(ctr),rT/1000,a,{units:'kilometers'}).geometry.coordinates;const p2=turf.destination(turf.point(ctr),R/1000,a,{units:'kilometers'}).geometry.coordinates;compassF.push(turf.lineString([p1,p2],{color:'#4a5568',stroke:'#4a5568',width:iL?1.2:0.7,_opacity:iL?0.6:0.3,baseHeight:0,_baseHeight:0,height:0.1}));}
      for(let a=0;a<360;a+=30){let lbl=a+'°';if(a===0)lbl='N';else if(a===90)lbl='L';else if(a===180)lbl='S';else if(a===270)lbl='O';lblF.push(turf.destination(turf.point(ctr),(R+18)/1000,a,{units:'kilometers',properties:{label:lbl,stroke:'#94a3b8'}}));}

      // Preparar features: garantir stroke=color e manter height/baseHeight intactos
      const all=JSON.parse(JSON.stringify([...compassF,...pathFeats,...lblF])).map(f=>{
        if(f.properties){
          f.properties.stroke=f.properties.color||f.properties.stroke||'#888';
          // NÃO deletar baseHeight, _baseHeight, height — necessários para 3D permanente
          delete f.properties.fill;
        }
        return f;
      });

      // Estilo 3D aplicado após criar o layer (funciona para 'layer' e 'raw')
      const applyStyle=async(layerName)=>{
        await new Promise(r=>setTimeout(r,600));
        try{await rpc.invoke('updateLayerStyle',[layerName,{
          type:'line',
          paint:{
            'line-color':['coalesce',['get','stroke'],['get','color'],'#888888'],
            'line-width':['coalesce',['get','width'],1.5],
            'line-opacity':['coalesce',['get','_opacity'],0.8],
          }
        }]);console.log(`[vG21] ✓ updateLayerStyle aplicado em: ${layerName}`);}
        catch(e){console.warn('[vG21] updateLayerStyle:',e?.message);}
      };

      if(mode==='raw'){
        // "Editável" → layer GeoJSON permanente (aparece no painel de Layers)
        const name='☀ Sun Path Editável';
        try{await rpc.invoke('deleteProjectLayer',[name]);}catch{}
        await new Promise(r=>setTimeout(r,400));
        await rpc.invoke('updateGeoJSONLayerContents',[name,{type:'FeatureCollection',features:all}]);
        await applyStyle(name);
        alert(`✓ Layer permanente criado: "${name}"\nJá com estilo de cor e 3D aplicado.`);
      }else{
        const name='☀ Sun Path 3D';
        try{await rpc.invoke('deleteProjectLayer',[name]);}catch{}
        await new Promise(r=>setTimeout(r,400));
        await rpc.invoke('updateGeoJSONLayerContents',[name,{type:'FeatureCollection',features:all}]);
        await applyStyle(name);
        alert(`✓ Camada fixada: "${name}"`);
      }
    }catch(e){console.error(e);alert('Erro: '+e?.message);}
    setBusy(false);
  };

  const syncLabel={ok:'✓ Sombras OK',syncing:'⟳',night:'☾ Noite',no_views:'⚠ View',error:'⚠ Erro',idle:''}[sync]||'';
  const syncCls={ok:'text-emerald-400',syncing:'text-amber-400',night:'text-slate-500',no_views:'text-red-400',error:'text-red-400',idle:'text-slate-600'}[sync]||'text-slate-600';
  const eqAc=doy===79||doy===266;

  return h('div',{className:'h-screen flex flex-col p-2 gap-2 bg-[#0f1117]'},
    // Header
    h('div',{className:'flex items-center justify-between border-b border-slate-800 pb-2 shrink-0'},
      h('div',null,
        h('h1',{className:'text-sm font-semibold text-white'},'☀ LB Sun Path 3D [vG21]'),
        h('p',{className:'text-[10px] text-slate-600'},`${lat.toFixed(4)}° · ${lng.toFixed(4)}°${scale!==1?` · ×${scale.toFixed(1)}=${effRad}m`:''}`)
      ),
      syncLabel&&h('span',{className:`text-[9px] px-1.5 py-0.5 bg-slate-900 rounded ${syncCls}`},syncLabel)
    ),
    // Scroll
    h('div',{className:'flex-1 min-h-0 overflow-y-auto ks flex flex-col gap-2'},
      h(SolarChart,{lat,lng,doy,sun:sunNow,seas}),
      // Presets
      h('div',{className:'grid grid-cols-3 gap-1.5'},
        ...[{e:'☀',l:'Verão',ac:doy===seas.sum,bc:'amber',fn:()=>setDoy(seas.sum),sub:seas.sumLbl},
            {e:'❄',l:'Inverno',ac:doy===seas.win,bc:'sky',fn:()=>setDoy(seas.win),sub:seas.winLbl},
            {e:'◎',l:'Equinócio',ac:eqAc,bc:'emerald',fn:()=>setDoy(d=>d===79?266:79),sub:eqAc&&doy===266?'23 Set':'20 Mar'}
        ].map(({e,l,ac,bc,fn,sub})=>{
          const C={amber:{b:'border-amber-500/25',t:'text-amber-400',bg:'bg-amber-500/10'},sky:{b:'border-sky-500/25',t:'text-sky-400',bg:'bg-sky-500/10'},emerald:{b:'border-emerald-500/25',t:'text-emerald-400',bg:'bg-emerald-500/10'}}[bc];
          return h('button',{key:l,onClick:fn,className:`flex flex-col items-center py-1.5 px-1 rounded border transition-all ${C.b} ${ac?C.bg:'bg-transparent hover:bg-white/[.02]'}`},
            h('span',{className:'text-xs leading-none'},e),h('span',{className:`text-[10px] font-semibold ${C.t}`},l),h('span',{className:'text-[9px] text-slate-600'},sub));
        })
      ),
      // Sliders
      h('div',{className:'bg-[#111827] rounded-lg border border-slate-800 p-2 flex flex-col gap-3'},
        ...[{l:'Horário',v:fmtH(hr),min:0,max:23.99,step:.25,val:hr,fn:v=>setHr(+v)},
            {l:'Data',v:fmtD(doy),min:1,max:365,step:1,val:doy,fn:v=>setDoy(+v)},
            {l:'Raio GLB',v:rad+'m',min:50,max:500,step:10,val:rad,fn:v=>setRad(+v)}
        ].map(({l,v,min,max,step,val,fn})=>h('div',{key:l},
          h('div',{className:'flex justify-between text-[11px] mb-1.5'},h('span',{className:'text-slate-400'},l),h('span',{className:'text-amber-400'},v)),
          h('input',{type:'range',className:'sl',min,max,step,value:val,onChange:e=>fn(e.target.value)})
        )),
        h('div',null,
          h('div',{className:'flex justify-between text-[11px] mb-1.5'},h('span',{className:'text-slate-400'},'Escala GLB'),h('span',{className:'text-amber-400'},`×${scale.toFixed(1)} → ${effRad}m`)),
          h('input',{type:'range',className:'sl',min:.1,max:5,step:.1,value:scale,onChange:e=>setScale(parseFloat(e.target.value))}),
          h('p',{className:'text-[9px] text-slate-600 mt-1'},'Ajuste se escalou o GLB no Giraffe')
        )
      ),
      // Centralizar + Toggle
      h('div',{className:'bg-[#111827] rounded-lg border border-slate-800 p-2 flex flex-col gap-2'},
        h('button',{onClick:handleCenter,className:'w-full py-1.5 rounded border border-slate-700 bg-slate-800/40 text-slate-300 hover:border-amber-500/40 hover:text-amber-400 text-[11px] font-semibold uppercase tracking-wider transition-all'},
          '⌖ Centralizar na Seleção'),
        h('p',{className:'text-[9px] text-slate-600 -mt-1 text-center'},'Selecione um elemento no mapa, depois clique'),
        h('div',{className:'flex items-center justify-between pt-1 border-t border-slate-800/50'},
          h('div',null,h('span',{className:'text-sm font-medium text-slate-300'},'Carta no Mapa 3D'),h('p',{className:'text-[10px] text-slate-600'},show?'Ativo':'Inativo')),
          h('button',{className:`tg ${show?'on':''}`,onClick:()=>setShow(v=>!v)})
        )
      ),
      // Bake + GLB
      h('div',{className:'flex flex-col gap-1.5'},
        h('button',{onClick:()=>handleBake('layer'),disabled:busy,className:`w-full py-1.5 rounded border border-amber-500/30 bg-amber-500/10 text-amber-500 text-[10px] font-bold uppercase tracking-wider hover:bg-amber-500/20 transition-colors ${busy?'opacity-50':''}`},'⇩ Fixar Camada'),
        h('div',{className:'flex gap-1.5'},
          h('button',{onClick:()=>handleBake('raw'),disabled:busy,className:`flex-1 py-1.5 rounded border border-emerald-500/30 bg-emerald-500/10 text-emerald-500 text-[10px] font-bold uppercase tracking-wider hover:bg-emerald-500/20 transition-colors ${busy?'opacity-50':''}`},'✏️ Editável'),
          h('button',{onClick:()=>{if(glbBusy)return;setGlbBusy(true);setTimeout(()=>{downloadGLB(lat,lng,rad);setGlbBusy(false);},100);},disabled:glbBusy,className:`flex-1 py-1.5 rounded border border-sky-500/30 bg-sky-500/10 text-sky-400 text-[10px] font-bold uppercase tracking-wider hover:bg-sky-500/20 transition-colors ${glbBusy?'opacity-50':''}`},glbBusy?'⟳ GLB':'⇩ GLB')
        )
      )
    )
  );
}
createRoot(document.getElementById('root')).render(h(SolarApp));
</script>
